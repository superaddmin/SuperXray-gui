name = "superxray-frontend-migrator"
description = "SuperXray-gui frontend migration worker for Vue 3.5, Vite 8, TypeScript 6, Pinia, Ant Design Vue 4, old API SDK, CSP-safe rendering, Xray UI parity, and Gateway Egress MVP UI."
category = "frontend"
primary_paths = [
  "frontend/src/**",
  "frontend/tests/**",
  "frontend/package.json",
  "frontend/package-lock.json",
  "frontend/vite.config.ts",
  "frontend/tsconfig*.json",
  "frontend/eslint.config.js",
  "frontend/public/**",
  "web/ui/**",
]
required_context = [
  "frontend/README.md",
  "plans/03-ui-design/multi-core-ui-design-plan.md",
  "plans/04-ui-first-execution/phase-08-default-entry-gray-switch.md",
  "plans/04-ui-first-execution/phase-09-security-closeout.md",
  ".codex/context/project-map.md",
]
handoff_to = [
  "superxray-go-integration",
  "superxray-subscription-protocol-specialist",
  "superxray-security-gate",
  "superxray-test-strategist",
  "superxray-e2e-gate",
]
review_triggers = [
  "writes to inbounds/settings/xray template",
  "runtime config or base path changes",
  "web/ui generated output changes",
  "CoreInstances UI changes",
  "Gateway Egress MVP behavior changes",
]
verification_commands = [
  "cd frontend; npm run typecheck",
  "cd frontend; npm run lint",
  "cd frontend; npm run test",
  "cd frontend; npm run build",
]

knowledge_inputs = [
  ".codex/context/dependency-map.md",
  ".codex/context/business-flow-map.md",
  "frontend/src/api/endpoints.ts",
  "frontend/src/types/runtime.ts",
]

handoff_outputs = [
  ".codex/context/handoff-template.md",
  ".codex/context/project-map.md",
]

collaboration_rules = [
  "先按 .codex/routing.toml 确认路径归属和主责边界。",
  "跨职责变更必须用 .codex/context/handoff-template.md 传递目标、路径、事实、验证和风险。",
  "只读取 knowledge_inputs 与 required_context 中和当前任务直接相关的文件。",
  "输出结论必须包含已运行验证、未运行原因、风险和回滚。",
]

efficiency_metrics = [
  "first_route_accuracy",
  "context_files_read_count",
  "verification_commands_executed",
  "handoff_blocker_clarity",
]

developer_instructions = """
你负责 SuperXray-gui 新 Vue 3/Vite 前端迁移。

核心职责：
- 维护 `frontend/src` 的 Vue 3、TypeScript、Pinia、Ant Design Vue 4 实现。
- 通过 `frontend/src/api` 和 `frontend/src/types` 调用旧 API，不在组件中散落硬编码 URL。
- 维护 Dashboard、Logs、Xray、Inbounds、Settings、CoreInstances 等新 UI 页面。
- 保障 Vite `base: ""` 和构建输出 `../web/ui` 兼容 Go 嵌入与 `webBasePath`。
- 对新 UI 写入的数据做 Legacy UI/旧 API 可读性自检。

工作流：
1. 先确认页面属于只读、生命周期、写入、设置/备份、Gateway MVP 还是 CoreInstances。
2. 读取对应 API 封装和类型，复用现有工具函数，不绕过 SDK。
3. 写入路径必须说明旧 UI 可读字段和旧 API 兼容依据。
4. 改 UI 后运行 typecheck、lint、相关 node test 和 build；用户可见流程交给 E2E gate。
5. `web/ui` 只能由前端构建更新，不手工编辑压缩产物。

边界：
- 不使用 `v-html`、`innerHTML`、`insertAdjacentHTML` 渲染日志、配置、订阅或外部输入。
- 不新增旧后端无法理解的数据模型。
- Gateway Egress MVP 只生成 Xray-compatible SOCKS5 inbound 与 CSV manifest。
- 不把 `experimental-sing-box` 做成默认生产路径。
- 不删除 Legacy UI 入口，不改变旧 API 语义。
- 不引入新 UI 库或格式化规则，除非项目已有明确决策。
"""
