components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: SuperXray
      description: HttpOnly SameSite=Lax panel session cookie issued by POST /login.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Session-bound CSRF token injected into the Vue runtime config; X-XSRF-Token is accepted as a compatibility alias.
  parameters:
    IDPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ClientIDPath:
      name: clientId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    EmailPath:
      name: email
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    BucketPath:
      name: bucket
      in: path
      required: true
      schema:
        type: integer
        enum: [2, 30, 60, 120, 180, 300]
    CountPath:
      name: count
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    VersionPath:
      name: version
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    FileNamePath:
      name: fileName
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z0-9_\\-.]+$'
    ActionPath:
      name: action
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  requestBodies:
    LegacyForm:
      required: false
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/LegacyFormRecord'
    InboundFormOrJson:
      required: false
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/Inbound'
        application/json:
          schema:
            $ref: '#/components/schemas/Inbound'
    CopyInboundClients:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/CopyInboundClientsRequest'
        application/json:
          schema:
            $ref: '#/components/schemas/CopyInboundClientsRequest'
    ImportInboundForm:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            required: [data]
            properties:
              data:
                type: string
                description: Serialized legacy inbound JSON object.
    TrafficUpdateJson:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TrafficUpdateRequest'
    LogsFilterForm:
      required: false
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              level:
                type: string
              syslog:
                type: string
    XrayLogsFilterForm:
      required: false
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              filter:
                type: string
              showDirect:
                type: string
              showBlocked:
                type: string
              showProxy:
                type: string
    ImportDatabaseMultipart:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [db]
            properties:
              db:
                type: string
                format: binary
                description: .db, .sqlite, or .sqlite3 backup file within the server size limit.
    EchCertForm:
      required: false
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              sni:
                type: string
    CustomGeoForm:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/CustomGeoForm'
        application/json:
          schema:
            $ref: '#/components/schemas/CustomGeoForm'
    AllSettingFormOrJson:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/AllSetting'
        application/json:
          schema:
            $ref: '#/components/schemas/AllSetting'
    UpdateUserForm:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/UpdateUserForm'
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateUserForm'
    XrayUpdateForm:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            required: [xraySetting]
            properties:
              xraySetting:
                type: string
              outboundTestUrl:
                type: string
                format: uri
    WarpActionForm:
      required: false
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              privateKey:
                type: string
              publicKey:
                type: string
              license:
                type: string
    NordActionForm:
      required: false
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              countryId:
                type: string
              token:
                type: string
              key:
                type: string
    OutboundTagForm:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            required: [tag]
            properties:
              tag:
                type: string
    TestOutboundForm:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            required: [outbound]
            properties:
              outbound:
                type: string
                description: Serialized outbound JSON fragment.
              allOutbounds:
                type: string
                description: Optional serialized outbound array for dialerProxy resolution.
  responses:
    LegacyMsg:
      description: Legacy JSON response envelope used by web/entity.Msg.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LegacyResponse'
    BinaryFile:
      description: Authenticated binary file download.
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    ForbiddenCSRF:
      description: CSRF validation failed for a state-changing request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LegacyResponse'
          examples:
            csrfFailed:
              value:
                success: false
                msg: CSRF validation failed
                obj: null
    AuthNotFound:
      description: Unauthenticated /panel/api requests intentionally return 404 to hide API existence.
  schemas:
    OpenAPIDocument:
      type: object
      additionalProperties: true
      required: [openapi, info, paths]
      properties:
        openapi:
          type: string
        info:
          type: object
          additionalProperties: true
        servers:
          type: array
          items:
            type: object
            additionalProperties: true
        paths:
          type: object
          additionalProperties: true
    LegacyResponse:
      type: object
      required: [success, msg, obj]
      properties:
        success:
          type: boolean
        msg:
          type: string
        obj:
          description: Endpoint-specific payload. Existing clients unwrap this field.
    LegacyFormRecord:
      type: object
      additionalProperties:
        oneOf:
          - type: string
          - type: number
          - type: boolean
    Inbound:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
        userId:
          type: integer
        up:
          type: integer
          format: int64
        down:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        remark:
          type: string
        enable:
          type: boolean
        expiryTime:
          type: integer
          format: int64
        listen:
          type: string
        port:
          type: integer
        protocol:
          type: string
          enum: [vmess, vless, trojan, shadowsocks, dokodemo-door, socks, http, hysteria2, wireguard]
        settings:
          type: string
          description: Legacy JSON string stored on database/model.Inbound.
        streamSettings:
          type: string
          description: Legacy JSON string stored on database/model.Inbound.
        sniffing:
          type: string
          description: Legacy JSON string stored on database/model.Inbound.
        tag:
          type: string
        clientStats:
          type: array
          items:
            $ref: '#/components/schemas/ClientTraffic'
    ClientTraffic:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
        inboundId:
          type: integer
        enable:
          type: boolean
        email:
          type: string
        up:
          type: integer
          format: int64
        down:
          type: integer
          format: int64
        expiryTime:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        reset:
          type: integer
    CopyInboundClientsRequest:
      type: object
      required: [sourceInboundId]
      properties:
        sourceInboundId:
          type: integer
          minimum: 1
        clientEmails:
          type: array
          items:
            type: string
        flow:
          type: string
    TrafficUpdateRequest:
      type: object
      required: [upload, download]
      properties:
        upload:
          type: integer
          format: int64
        download:
          type: integer
          format: int64
    CustomGeoForm:
      type: object
      required: [type, alias, url]
      properties:
        type:
          type: string
          enum: [geoip, geosite]
        alias:
          type: string
          pattern: '^[A-Za-z0-9_-]+$'
        url:
          type: string
          format: uri
    AllSetting:
      type: object
      additionalProperties: true
      description: Legacy panel settings payload mirrored by web/entity.AllSetting.
    UpdateUserForm:
      type: object
      required: [oldUsername, oldPassword, newUsername, newPassword]
      properties:
        oldUsername:
          type: string
        oldPassword:
          type: string
        newUsername:
          type: string
        newPassword:
          type: string
