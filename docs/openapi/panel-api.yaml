      summary: Create a legacy Xray inbound. Accepts form or JSON fields matching database/model.Inbound.
      operationId: addInbound
      requestBody:
        $ref: '#/components/requestBodies/InboundFormOrJson'
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        '200':
          $ref: '#/components/responses/LegacyMsg'
        '403':
          $ref: '#/components/responses/ForbiddenCSRF'
        '404':
