openapi: 3.1.0
info:
  title: SuperXray Panel API
  version: 0.1.0
  description: |
    Machine-readable contract for the Vue panel API implemented by the local Go/Gin backend.
    Runtime deployments may prepend the configured webBasePath before these paths.
    The legacy response envelope is web/entity.Msg: success, msg, obj.
servers:
  - url: "{webBasePath}"
    description: Runtime panel base path. Use / for the source default; deployments may use /xui/ or another configured prefix.
    variables:
      webBasePath:
        default: /
tags:
  - name: Inbounds
    description: Legacy Xray inbound and client management backed by database/model.Inbound.
  - name: Server
    description: Panel status, logs, backups, geofile updates, and Xray service actions.
  - name: Cores
    description: Phase 10 read-only/minimal core instance registry and guarded lifecycle endpoints.
  - name: CustomGeo
    description: Authenticated custom geoip/geosite resource management.
  - name: Settings
    description: Panel settings and current user settings.
  - name: Xray
    description: Xray template, outbound tools, Warp, and NordVPN helpers.
  - name: Telegram
    description: Telegram backup trigger.
security:
  - cookieAuth: []
paths:
  /panel/api/backuptotgbot:
    post:
      tags: [Telegram]
      summary: Send a panel database backup to configured Telegram bot administrators.
      operationId: backupToTelegram
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        '200':
          $ref: '#/components/responses/LegacyMsg'
        '403':
          $ref: '#/components/responses/ForbiddenCSRF'
        '404':
          $ref: '#/components/responses/AuthNotFound'
  /panel/api/openapi.json:
    get:
      tags: [Server]
      summary: Get the authenticated runtime OpenAPI document for the Vue panel.
      operationId: getPanelOpenAPI
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Runtime OpenAPI 3.1 JSON document with servers rewritten for the active webBasePath.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAPIDocument'
        '404':
          $ref: '#/components/responses/AuthNotFound'
  /panel/api/inbounds/list:
    get:
      tags: [Inbounds]
      summary: List inbounds for the logged-in user.
      operationId: listInbounds
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/LegacyMsg'
        '404':
          $ref: '#/components/responses/AuthNotFound'
  /panel/api/inbounds/options:
    get:
      tags: [Inbounds]
      summary: List lightweight inbound options for selectors and API clients.
      operationId: listInboundOptions
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/LegacyMsg'
        '404':
          $ref: '#/components/responses/AuthNotFound'
  /panel/api/inbounds/get/{id}:
    get:
      tags: [Inbounds]
      summary: Get one inbound by id.
      operationId: getInbound
      parameters:
        - $ref: '#/components/parameters/IDPath'
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/LegacyMsg'
        '404':
          $ref: '#/components/responses/AuthNotFound'
  /panel/api/inbounds/getClientTraffics/{email}:
    get:
      tags: [Inbounds]
      summary: Get client traffic records by email.
      operationId: getClientTraffics
      parameters:
        - $ref: '#/components/parameters/EmailPath'
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/LegacyMsg'
        '404':
