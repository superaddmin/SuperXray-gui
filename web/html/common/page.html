{{ define "page/head_start" }}
<!DOCTYPE html>
<html lang="{{ .lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ .host }} - {{ i18n .title }}">
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="{{ .base_path }}assets/ant-design-vue/antd.min.css">
  <link rel="stylesheet" href="{{ .base_path }}assets/css/custom.min.css?{{ .cur_ver }}">
  <style nonce="{{ .csp_nonce }}">
    [v-cloak] {
      display: none;
    }
    /* vazirmatn-regular - arabic_latin_latin-ext */
    @font-face {
      font-display: swap;
      font-family: 'Vazirmatn';
      font-style: normal;
      font-weight: 400;
      src: url('{{ .base_path }}assets/Vazirmatn-UI-NL-Regular.woff2') format('woff2');
      unicode-range: U+0600-06FF, U+200C-200E, U+2010-2011, U+204F, U+2E41, U+FB50-FDFF, U+FE80-FEFC, U+0030-0039;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Vazirmatn', 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    /* Responsive font system */
    :root { --font-xs: 0.75rem; --font-sm: 0.8125rem; --font-base: 0.875rem; --font-lg: 1rem; --font-xl: 1.25rem; --font-2xl: 1.5rem; }
    @media (max-width: 768px) { :root { --font-base: 0.9375rem; } }
    /* Color semantic map */
    :root { --color-status-ok: #11b99d; --color-status-info: #3c89e8; --color-status-warning: #e89a3c; --color-status-error: #e84749; --color-status-disabled: #8c8c8c; }
    /* Screen reader only utility */
    .sr-only { position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

    /* mobile touch scrolling for tabs */
    @media (max-width: 576px) {
      .ant-tabs-nav-container {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
        overscroll-behavior-x: contain;
        white-space: nowrap;
        max-width: 100%;
        padding: 0 28px !important;
      }
      .ant-tabs-nav-wrap {
        overflow: visible !important;
        padding: 0 !important;
      }
      .ant-tabs-nav-scroll {
        overflow: visible !important;
        box-shadow: none !important;
      }
      .ant-tabs-nav {
         display: flex !important;
         transform: none !important;
         width: auto !important;
         margin: 0 !important;
      }
      .ant-tabs-tab-prev,
      .ant-tabs-tab-next {
        display: flex !important;
        align-items: center;
        justify-content: center;
        min-width: 28px;
      }
      .ant-tabs-nav-container::-webkit-scrollbar {
        height: 4px;
      }
    }
    /* Responsive modals - prevent overflow on mobile */
    @media (max-width: 768px) {
      .ant-modal { max-width: 96vw; margin: 12px auto; }
      .ant-modal-wrap { overflow-x: hidden; }
    }
    /* Touch target minimum 44px (WCAG 2.5.5) */
    @media (max-width: 576px) {
      .card-action-button,
      .ant-btn:not(.ant-btn-sm),
      .ant-menu-item,
      .ant-tabs-tab,
      .ant-switch,
      .ant-select-selection,
      .ant-dropdown-menu-item,
      .ant-list-item {
        min-height: 44px;
      }
      .ant-btn:not(.ant-btn-sm) {
        min-width: 44px;
      }
      .ant-tabs-tab {
        padding: 12px 16px !important;
      }
    }
    /* Image lazy loading */
    img[loading] { transition: opacity .3s ease; }
    img[loading=lazy] { opacity: 0; }
    img[loading=lazy].loaded, img[loading=lazy][complete] { opacity: 1; }
    /* Mobile Floating Action Button */
    .mobile-fab { position: fixed; bottom: 24px; right: 24px; z-index: 1000; width: 56px; height: 56px; font-size: 24px; box-shadow: 0 4px 12px rgba(0,0,0,.25); }
  </style>
  <title>{{ .host }} – {{ i18n .title}}</title>
{{ end }}

{{ define "page/head_end" }}
</head>
{{ end }}

{{ define "page/body_start" }}
<body>
  <div id="message"></div>
{{ end }}

{{ define "page/body_scripts" }}
<script nonce="{{ .csp_nonce }}" src="{{ .base_path }}assets/vue/vue.min.js?{{ .cur_ver }}"></script>
<script nonce="{{ .csp_nonce }}" src="{{ .base_path }}assets/moment/moment.min.js"></script>
<script nonce="{{ .csp_nonce }}" src="{{ .base_path }}assets/ant-design-vue/antd.min.js"></script>
<script nonce="{{ .csp_nonce }}" src="{{ .base_path }}assets/axios/axios.min.js?{{ .cur_ver }}"></script>
<script nonce="{{ .csp_nonce }}" src="{{ .base_path }}assets/qs/qs.min.js"></script>
<script nonce="{{ .csp_nonce }}" src="{{ .base_path }}assets/js/axios-init.js?{{ .cur_ver }}"></script>
<script nonce="{{ .csp_nonce }}" src="{{ .base_path }}assets/js/util/index.js?{{ .cur_ver }}"></script>
<script nonce="{{ .csp_nonce }}">
  const basePath = '{{ .base_path }}';
  const csrfToken = '{{ .csrf_token }}';
  window.__SUPERXRAY_CSRF_TOKEN__ = csrfToken;
  axios.defaults.baseURL = basePath;
  if (csrfToken) {
    axios.defaults.headers.common['X-CSRF-Token'] = csrfToken;
  }
</script>
<script nonce="{{ .csp_nonce }}" src="{{ .base_path }}assets/js/websocket.js?{{ .cur_ver }}"></script>
<script nonce="{{ .csp_nonce }}">
(function(){var a=document.documentElement.getAttribute('lang');if(a){var b=new MutationObserver(function(){var c=document.getElementById('app');if(c&&!c.hasAttribute('lang'))c.setAttribute('lang',a)});b.observe(document.body||document.documentElement,{childList:true,subtree:true});setTimeout(function(){b.disconnect()},5000)}})();
</script>
{{ end }}
  
{{ define "page/body_end" }}
</body>
</html>
{{ end }}
