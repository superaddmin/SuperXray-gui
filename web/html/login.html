{{ template "page/head_start" .}}
<style nonce="{{ .csp_nonce }}">
  :root {
    color-scheme: dark;
  }

  body {
    background: #080d1b;
  }

  #app.login-app {
    overflow: hidden;
    color: #f8fafc;
    background:
      linear-gradient(116deg, rgba(47, 115, 246, 0.2) 0%, rgba(47, 115, 246, 0.07) 29%, transparent 58%),
      linear-gradient(248deg, rgba(249, 115, 22, 0.18) 0%, rgba(249, 115, 22, 0.06) 28%, transparent 62%),
      linear-gradient(180deg, #0b1120 0%, #080d1b 48%, #05070f 100%);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0;
  }

  #app.login-app .under {
    min-height: 100vh;
    background: transparent !important;
  }

  #app.login-app .waves-header {
    display: none;
  }

  #app.login-app #login.ant-col {
    flex: 0 0 min(672px, calc(100vw - 48px)) !important;
    width: min(672px, calc(100vw - 48px)) !important;
    max-width: min(672px, calc(100vw - 48px)) !important;
  }

  #app.login-app #login {
    position: relative;
    padding: 48px;
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 24px;
    background:
      linear-gradient(145deg, rgba(47, 115, 246, 0.08), transparent 52%),
      linear-gradient(320deg, rgba(249, 115, 22, 0.06), transparent 58%),
      rgba(31, 36, 51, 0.88);
    box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
    backdrop-filter: blur(22px);
    animation: login-card-in 420ms ease both;
  }

  #app.login-app #login:hover {
    box-shadow: 0 32px 90px rgba(0, 0, 0, 0.48);
  }

  @keyframes login-card-in {
    from {
      opacity: 0;
      transform: translateY(24px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  #app.login-app .setting-section {
    position: absolute;
    top: 22px;
    right: 22px;
    padding: 0;
  }

  #app.login-app .setting-section .ant-btn {
    width: 42px;
    height: 42px;
    border-color: rgba(148, 163, 184, 0.22);
    background: rgba(11, 18, 33, 0.68);
    color: #f8fafc;
  }

  #app.login-app .login-brand-mark {
    display: grid;
    width: 84px;
    height: 84px;
    margin: 0 auto 28px;
    place-items: center;
    border-radius: 22px;
    background: #3b82f6;
    color: #ffffff;
    box-shadow: 0 18px 42px rgba(47, 115, 246, 0.32);
  }

  #app.login-app .login-brand-mark .anticon {
    color: #ffffff !important;
    font-size: 38px;
  }

  #app.login-app .title {
    margin: 0 0 12px;
    color: #ffffff;
    font-size: 34px;
    font-weight: 820;
    line-height: 1.15;
    letter-spacing: 0;
    text-align: center;
  }

  #app.login-app .login-subtitle {
    margin: 0 0 38px;
    color: #a6b0c3;
    font-size: 22px;
    line-height: 1.45;
    text-align: center;
  }

  #app.login-app .login-form-space,
  #app.login-app .ant-space-vertical,
  #app.login-app .ant-form,
  #app.login-app .ant-form-item,
  #app.login-app .ant-form-item-control-wrapper {
    width: 100%;
  }

  #app.login-app .ant-form-item {
    margin-bottom: 24px;
  }

  #app.login-app .ant-form-item-label {
    padding: 0 0 10px;
    line-height: 1.2;
    text-align: left;
  }

  #app.login-app .ant-form-item-label > label {
    color: #f8fafc;
    font-size: 16px;
    font-weight: 740;
  }

  #app.login-app .ant-input,
  #app.login-app .ant-input-password,
  #app.login-app .ant-input-affix-wrapper {
    height: 74px;
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 16px;
    background: rgba(47, 54, 73, 0.74) !important;
    color: #f8fafc;
    font-size: 22px;
    box-shadow: none;
  }

  #app.login-app .ant-input-affix-wrapper .ant-input {
    height: 72px;
    border: 0;
    background: transparent !important;
    box-shadow: none;
  }

  #app.login-app .ant-input::placeholder {
    color: rgba(166, 176, 195, 0.62);
  }

  #app.login-app .ant-input-prefix,
  #app.login-app .ant-input-password-icon,
  #app.login-app .anticon {
    color: #7d879b;
  }

  #app.login-app .ant-input:hover,
  #app.login-app .ant-input:focus,
  #app.login-app .ant-input-affix-wrapper:hover,
  #app.login-app .ant-input-affix-wrapper-focused {
    border-color: rgba(47, 115, 246, 0.68);
    box-shadow: 0 0 0 3px rgba(47, 115, 246, 0.16);
  }

  #app.login-app .wave-btn-bg {
    width: 100% !important;
    height: 72px !important;
    margin-top: 6px !important;
    border: 0 !important;
    border-radius: 16px;
    background: transparent !important;
    background-image: none !important;
    transition: none;
  }

  #app.login-app .wave-btn-bg::before {
    display: none !important;
  }

  #app.login-app .ant-btn-primary-login {
    width: 100% !important;
    height: 72px !important;
    border: 0;
    border-radius: 16px;
    background: #2f73f6 !important;
    color: #ffffff;
    font-size: 22px;
    font-weight: 760;
    box-shadow: 0 18px 42px rgba(47, 115, 246, 0.34);
  }

  #app.login-app .ant-btn-primary-login:hover,
  #app.login-app .ant-btn-primary-login:focus {
    width: 100% !important;
    background: #3b82f6 !important;
    color: #ffffff;
  }

  #app.login-app input.ant-input:-webkit-autofill {
    -webkit-text-fill-color: #f8fafc;
    caret-color: #f8fafc;
    box-shadow: 0 0 0 1000px #30364a inset;
  }

  #app.login-app .headline.zoom b.is-hidden {
    pointer-events: none;
  }

  #app.login-app button:focus-visible,
  #app.login-app input:focus-visible,
  #app.login-app a:focus-visible,
  #app.login-app .ant-select-selection:focus-visible {
    outline: 2px solid #3b82f6;
    outline-offset: 2px;
  }

  @media (max-width: 768px) {
    #app.login-app #login.ant-col {
      flex-basis: calc(100vw - 28px) !important;
      width: calc(100vw - 28px) !important;
      max-width: calc(100vw - 28px) !important;
    }

    #app.login-app #login {
      padding: 34px 24px;
      border-radius: 22px;
    }

    #app.login-app .login-brand-mark {
      width: 70px;
      height: 70px;
      border-radius: 19px;
    }

    #app.login-app .title {
      font-size: 28px;
    }

    #app.login-app .login-subtitle {
      font-size: 18px;
    }

    #app.login-app .ant-input,
    #app.login-app .ant-input-password,
    #app.login-app .ant-input-affix-wrapper,
    #app.login-app .wave-btn-bg,
    #app.login-app .ant-btn-primary-login {
      height: 60px !important;
      font-size: 18px;
    }

    #app.login-app .ant-input-affix-wrapper .ant-input {
      height: 58px !important;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #app.login-app *,
    #app.login-app *::before,
    #app.login-app *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

<a-layout id="app" v-cloak :class="themeSwitcher.currentTheme + ' login-app'">
  <transition name="list" appear>
    <a-layout-content class="under min-h-0">
      <div class="waves-header">
        <div class="waves-inner-header"></div>
        <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
          viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
          <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
          </defs>
          <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(0, 135, 113, 0.08)" />
            <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(0, 135, 113, 0.08)" />
            <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(0, 135, 113, 0.08)" />
            <use xlink:href="#gentle-wave" x="48" y="7" fill="#c7ebe2" />
          </g>
        </svg>
      </div>
      <a-row type="flex" justify="center" align="middle" class="h-100 overflow-y-auto overflow-x-hidden">
        <a-col :xs="22" :sm="12" :md="10" :lg="8" :xl="6" :xxl="5" id="login" class="my-3rem">
          <template v-if="!loadingStates.fetched">
            <div class="text-center">
              <a-spin size="large" />
            </div>
          </template>
          <template v-else>
            <div class="setting-section">
              <a-popover :overlay-class-name="themeSwitcher.currentTheme" title='{{ i18n "menu.settings" }}'
                placement="bottomRight" trigger="click">
                <template slot="content">
                  <a-space direction="vertical" :size="10">
                    <a-theme-switch-login></a-theme-switch-login>
                    <span>{{ i18n "pages.settings.language" }}</span>
                    <a-select ref="selectLang" class="w-100" v-model="lang" @change="LanguageManager.setLanguage(lang)"
                      aria-label='{{ i18n "pages.settings.language" }}'
                      :dropdown-class-name="themeSwitcher.currentTheme">
                      <a-select-option :value="l.value" label="English" v-for="l in LanguageManager.supportedLanguages">
                        <span role="img" aria-label="l.name" v-text="l.icon"></span>
                        &nbsp;&nbsp;<span v-text="l.name"></span>
                      </a-select-option>
                    </a-select>
                  </a-space>
                </template>
                <a-button shape="circle" icon="setting" aria-label='{{ i18n "menu.settings" }}'></a-button>
              </a-popover>
            </div>
            <a-row type="flex" justify="center">
              <a-col :style="{ width: '100%' }">
                <div class="login-brand-mark" aria-hidden="true">
                  <a-icon type="star"></a-icon>
                </div>
                <h2 class="title headline zoom">
                  <span class="words-wrapper">
                    <b class="is-visible">{{ i18n "pages.login.hello" }}</b>
                    <b>{{ i18n "pages.login.title" }}</b>
                  </span>
                </h2>
                <p class="login-subtitle">Sign in to access SuperXray</p>
              </a-col>
            </a-row>
            <a-row type="flex" justify="center">
              <a-col span="24">
                <a-form layout="vertical" @submit.prevent="login">
                  <a-space class="login-form-space" direction="vertical" size="middle">
                    <a-form-item label='{{ i18n "username" }}'>
                      <a-input autocomplete="username" name="username" aria-label='{{ i18n "username" }}' v-model.trim="user.username"
                        placeholder='{{ i18n "username" }}' autofocus required>
                        <a-icon slot="prefix" type="user" class="fs-1rem"></a-icon>
                      </a-input>
                    </a-form-item>
                    <a-form-item label='{{ i18n "password" }}'>
                      <a-input-password autocomplete="current-password" name="password" aria-label='{{ i18n "password" }}' v-model.trim="user.password"
                        placeholder='{{ i18n "password" }}' required>
                        <a-icon slot="prefix" type="lock" class="fs-1rem"></a-icon>
                      </a-input-password>
                    </a-form-item>
                    <a-form-item v-if="twoFactorEnable" label='{{ i18n "twoFactorCode" }}'>
                      <a-input autocomplete="one-time-code" name="twoFactorCode" aria-label='{{ i18n "twoFactorCode" }}' v-model.trim="user.twoFactorCode"
                        placeholder='{{ i18n "twoFactorCode" }}' required>
                        <a-icon slot="prefix" type="key" class="fs-1rem"></a-icon>
                      </a-input>
                    </a-form-item>
                    <a-form-item>
                      <a-row justify="center" class="centered">
                        <div class="wave-btn-bg wave-btn-bg-cl h-50px mt-1rem"
                          :style="loadingStates.spinning ? 'width: 52px' : 'display: inline-block'">
                          <a-button class="ant-btn-primary-login" type="primary" :loading="loadingStates.spinning"
                            :icon="loadingStates.spinning ? 'poweroff' : undefined" html-type="submit">
                            [[ loadingStates.spinning ? '' : '{{ i18n "login" }}' ]]
                          </a-button>
                        </div>
                      </a-row>
                    </a-form-item>
                  </a-space>
                </a-form>
              </a-col>
            </a-row>
          </template>
        </a-col>
      </a-row>
    </a-layout-content>
  </transition>
</a-layout>

{{template "component/aThemeSwitch" .}}
<script nonce="{{ .csp_nonce }}">
  const app = new Vue({
    delimiters: ['[[', ']]'],
    el: '#app',
    data: {
      themeSwitcher,
      loadingStates: { fetched: false, spinning: false },
      user: { username: "", password: "", twoFactorCode: "" },
      twoFactorEnable: false,
      lang: "",
      animationStarted: false
    },
    async mounted() {
      this.lang = LanguageManager.getLanguage();
      this.twoFactorEnable = await this.getTwoFactorEnable();
    },
    methods: {
      async login() {
        this.loadingStates.spinning = true;
        const msg = await HttpUtil.post('/login', this.user);
        if (msg.success) {
          location.href = basePath + 'panel/';
        }
        this.loadingStates.spinning = false;
      },
      async getTwoFactorEnable() {
        const msg = await HttpUtil.post('/getTwoFactorEnable');
        if (msg.success) {
          this.twoFactorEnable = msg.obj;
          this.loadingStates.fetched = true;
          this.$nextTick(() => {
            if (!this.animationStarted) {
              this.animationStarted = true;
              this.initHeadline();
            }
          });
          return msg.obj;
        }
      },
      initHeadline() {
        const animationDelay = 2000;
        const headlines = this.$el.querySelectorAll('.headline');
        headlines.forEach((headline) => {
          const first = headline.querySelector('.is-visible');
          if (!first) return;
          setTimeout(() => this.hideWord(first, animationDelay), animationDelay);
        });
      },
      hideWord(word, delay) {
        const nextWord = this.takeNext(word);
        this.switchWord(word, nextWord);
        setTimeout(() => this.hideWord(nextWord, delay), delay);
      },
      takeNext(word) {
        return word.nextElementSibling || word.parentElement.firstElementChild;
      },
      switchWord(oldWord, newWord) {
        oldWord.classList.remove('is-visible');
        oldWord.classList.add('is-hidden');
        newWord.classList.remove('is-hidden');
        newWord.classList.add('is-visible');
      }
    },
  });

  const pm_input_selector = 'input.ant-input, textarea.ant-input';
  const pm_strip_props = [
    'background',
    'background-color',
    'background-image',
    'color'
  ];

  const pm_observed_forms = new WeakSet();

  function pm_strip_inline(el) {
    if (!el || el.nodeType !== 1 || !el.matches?.(pm_input_selector)) return;

    let did_change = false;
    for (const prop of pm_strip_props) {
      if (el.style.getPropertyValue(prop)) {
        el.style.removeProperty(prop);
        did_change = true;
      }
    }

    if (did_change && el.style.length === 0) {
      el.removeAttribute('style');
    }
  }

  function pm_attach_observer(form) {
    if (pm_observed_forms.has(form)) return;
    pm_observed_forms.add(form);

    form.querySelectorAll(pm_input_selector).forEach(pm_strip_inline);

    const pm_mo = new MutationObserver(mutations => {
      for (const m of mutations) {
        if (m.type === 'attributes') {
          pm_strip_inline(m.target);
        } else if (m.type === 'childList') {
          for (const n of m.addedNodes) {
            if (n.nodeType !== 1) continue;
            if (n.matches?.(pm_input_selector)) pm_strip_inline(n);
            n.querySelectorAll?.(pm_input_selector).forEach(pm_strip_inline);
          }
        }
      }
    });

    pm_mo.observe(form, {
      attributes: true,
      attributeFilter: ['style'],
      childList: true,
      subtree: true
    });
  }

  function pm_init() {
    document.querySelectorAll('form.ant-form').forEach(pm_attach_observer);
    const pm_host = document.getElementById('login') || document.body;
    const pm_wait_for_forms = new MutationObserver(mutations => {
      for (const m of mutations) {
        for (const n of m.addedNodes) {
          if (n.nodeType !== 1) continue;
          if (n.matches?.('form.ant-form')) pm_attach_observer(n);
          n.querySelectorAll?.('form.ant-form').forEach(pm_attach_observer);
        }
      }
    });
    pm_wait_for_forms.observe(pm_host, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', pm_init, { once: true });
  } else {
    pm_init();
  }
</script>
