<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon group: radar/target (scaled and positioned to fit 64px height) -->
  <g transform="translate(8, 8) scale(0.16)">
    <!-- Background wings -->
    <path d="M 320 30 L 150 30 C 70 30 40 70 40 140 L 40 160 L 120 160 L 120 130 C 120 90 140 80 180 80 L 280 80 Z" fill="#2563EB" />
    <polygon points="220,150 360,30 460,30 260,150" fill="#2563EB" />
    <polygon points="220,150 60,270 160,270 260,150" fill="#2563EB" />
    <polygon points="220,150 380,270 480,270 270,150" fill="#2563EB" />

    <!-- Center circle background (visible on dark background) -->
    <circle cx="220" cy="150" r="90" fill="#1A2332" />

    <!-- Blue rings -->
    <circle cx="220" cy="150" r="75" fill="none" stroke="#2563EB" stroke-width="18" />
    <circle cx="220" cy="150" r="45" fill="none" stroke="#2563EB" stroke-width="8" />

    <!-- Orange center dot -->
    <circle cx="220" cy="150" r="18" fill="#F97316" filter="url(#glow)" />

    <!-- Signal line -->
    <line x1="220" y1="150" x2="520" y2="150" stroke="#F97316" stroke-width="6" />

    <!-- Signal bars -->
    <path d="M 340 135 L 340 165 M 360 120 L 360 180 M 380 105 L 380 195 M 400 90 L 400 210 M 420 100 L 420 200 M 440 115 L 440 185 M 460 130 L 460 170 M 480 140 L 480 160" stroke="#F97316" stroke-width="8" stroke-linecap="round" fill="none" />
  </g>

  <!-- Text: SuperXray -->
  <text x="62" y="41" font-family="'Montserrat', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.5">
    <tspan fill="#2563EB">Super</tspan><tspan fill="#F97316">Xray</tspan>
  </text>
</svg>
