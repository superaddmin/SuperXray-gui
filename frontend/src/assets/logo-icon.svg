<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Radar/Target icon centered in 64x64 -->
  <g transform="translate(32, 32)">
    <!-- Background wings -->
    <path d="M 28 -18 L 0 -18 C -14 -18 -18 -12 -18 0 L -18 3 L -10 3 L -10 -3 C -10 -10 -7 -12 0 -12 L 16 -12 Z" fill="#2563EB" transform="translate(0, 0)" />
    <polygon points="0,0 18,-18 28,-18 10,0" fill="#2563EB" />
    <polygon points="0,0 -18,18 -8,18 10,0" fill="#2563EB" />
    <polygon points="0,0 18,18 28,18 10,0" fill="#2563EB" />

    <!-- Center circle background -->
    <circle cx="0" cy="0" r="14" fill="#F0F4F8" />

    <!-- Blue rings -->
    <circle cx="0" cy="0" r="11.5" fill="none" stroke="#2563EB" stroke-width="2.5" />
    <circle cx="0" cy="0" r="7" fill="none" stroke="#2563EB" stroke-width="1.5" />

    <!-- Orange center dot -->
    <circle cx="0" cy="0" r="3" fill="#F97316" filter="url(#glow)" />

    <!-- Signal line -->
    <line x1="0" y1="0" x2="24" y2="0" stroke="#F97316" stroke-width="1" />

    <!-- Signal bars -->
    <path d="M 12 -3 L 12 3 M 14 -5 L 14 5 M 16 -6.5 L 16 6.5 M 18 -8 L 18 8 M 19 -7 L 19 7 M 20 -5.5 L 20 5.5 M 21.5 -4 L 21.5 4 M 22.5 -2.5 L 22.5 2.5" stroke="#F97316" stroke-width="1.2" stroke-linecap="round" fill="none" />
  </g>
</svg>
