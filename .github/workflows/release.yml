name: Release SuperXray

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
    paths:
      - "**.js"
      - "**.css"
      - "**.html"
      - "**.sh"
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "x-ui.service.debian"
      - "x-ui.service.arch"
      - "x-ui.service.rhel"
      - ".github/workflows/release.yml"
      - "CHANGELOG.md"
      - "config/version"
      - "README*.md"
      - "docs/**"
  pull_request:

jobs:
  analyze:
    name: Analyze Go code
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

      - name: Run tests
        run: go test -race -shuffle=on ./...

      - name: Validate release metadata
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must follow semantic version format vX.Y.Z or vX.Y.Z-prerelease: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          config_version="$(tr -d '[:space:]' < config/version)"
          if [[ "$version" != "$config_version" ]]; then
            echo "Tag version ($version) must match config/version ($config_version)." >&2
            exit 1
          fi
          if [[ ! -f CHANGELOG.md ]]; then
            echo "CHANGELOG.md is required for release notes." >&2
            exit 1
          fi
          if ! grep -Eq "^## \[${version//./\\.}\]" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a release section for [$version]." >&2
            exit 1
          fi

  build:
    name: Build Linux (${{ matrix.platform }})
    needs: analyze
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        platform:
          - amd64
          - arm64
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build SuperXray for Linux
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            amd64)
              docker_platform="linux/amd64"
              xray_zip="Xray-linux-64.zip"
              ;;
            arm64)
              docker_platform="linux/arm64/v8"
              xray_zip="Xray-linux-arm64-v8a.zip"
              ;;
            *)
              echo "Unsupported release platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac
          echo "XRAY_ZIP=$xray_zip" >> "$GITHUB_ENV"
          echo "Building ${{ matrix.platform }} inside $docker_platform container"
          rm -rf x-ui xui-release
          docker run --rm --platform "$docker_platform" \
            -v "$PWD:/workspace" \
            -w /workspace \
            golang:1.26-alpine \
            sh -s <<'EOF'
          set -eu
          apk add --no-cache build-base file ca-certificates tzdata
          CGO_ENABLED=1 CGO_CFLAGS="-D_LARGEFILE64_SOURCE" \
            go build -trimpath -ldflags "-w -s -linkmode external -extldflags '-static'" -o xui-release -v main.go
          file xui-release
          expected="$(tr -d '[:space:]' < config/version)"
          actual="$(./xui-release -v)"
          if [ "$actual" != "$expected" ]; then
            echo "binary version mismatch: got $actual, expected $expected" >&2
            exit 1
          fi
          EOF
          sudo chown "$(id -u):$(id -g)" xui-release
          file xui-release
          ldd xui-release || echo "Static binary confirmed"

      - name: Assemble package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p x-ui/bin
          cp xui-release x-ui/x-ui
          cp x-ui.service.debian x-ui/
          cp x-ui.service.arch x-ui/
          cp x-ui.service.rhel x-ui/
          cp x-ui.sh x-ui/

          cd x-ui/bin
          xray_url="https://github.com/XTLS/Xray-core/releases/download/v26.4.25/"
          wget -q "${xray_url}${XRAY_ZIP}"
          unzip -q "$XRAY_ZIP"
          rm -f "$XRAY_ZIP" geoip.dat geosite.dat
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          wget -q -O geoip_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geoip.dat
          wget -q -O geosite_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geosite.dat
          wget -q -O geoip_RU.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geoip.dat
          wget -q -O geosite_RU.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geosite.dat
          mv xray "xray-linux-${{ matrix.platform }}"

      - name: Package
        shell: bash
        run: tar -zcvf "x-ui-linux-${{ matrix.platform }}.tar.gz" x-ui

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: x-ui-linux-${{ matrix.platform }}
          path: ./x-ui-linux-${{ matrix.platform }}.tar.gz

      - name: Generate release notes
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 == "## [" version "]" { capture=1; print; next }
            /^## \[/ && capture { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Failed to generate release notes for $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Upload files to GH release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: x-ui-linux-${{ matrix.platform }}.tar.gz
          asset_name: x-ui-linux-${{ matrix.platform }}.tar.gz
          overwrite: true
          release_name: ${{ github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
