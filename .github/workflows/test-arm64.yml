name: Multi-Arch Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ===========================================
  #  Job 1: Native tests on amd64
  # ===========================================
  test-native:
    name: Native Tests (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test -race -shuffle=on ./...

  # ===========================================
  #  Job 2: ARM64 build & verification via QEMU
  # ===========================================
  test-arm64:
    name: Test on ARM64 (via QEMU)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ARM64 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu file

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cross-compile with CGO for Ubuntu arm64; execution is verified below under QEMU.
      - name: Build ARM64 binary
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -trimpath -ldflags='-s -w' -o SuperXray-gui-arm64 main.go
          file SuperXray-gui-arm64
          echo 'ARM64 build completed successfully'

      # Verify the binary is a valid ARM64 executable and can run under QEMU
      - name: Verify ARM64 binary in QEMU
        run: |
          # Check binary file type (should show ELF 64-bit LSB executable, ARM aarch64)
          docker run --rm --platform linux/arm64/v8 \
            -v "$PWD:/workspace" \
            -w /workspace \
            ubuntu:22.04 \
            bash -c "
              apt-get update && \
              DEBIAN_FRONTEND=noninteractive apt-get install -y file ca-certificates tzdata && \
              echo '--- File type verification ---' && \
              file ./SuperXray-gui-arm64 && \
              echo '--- Version check ---' && \
              ./SuperXray-gui-arm64 -v
            "
