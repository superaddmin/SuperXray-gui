name: Multi-Arch Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ===========================================
  #  Job 1: Native tests on amd64
  # ===========================================
  test-native:
    name: Native Tests (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test -race -shuffle=on ./...

  # ===========================================
  #  Job 2: ARM64 build & verification via QEMU
  # ===========================================
  test-arm64:
    name: Test on ARM64 (via QEMU)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build inside an ARM64 Docker container to satisfy CGO requirements
      # (gorm.io/driver/sqlite wraps go-sqlite3 which needs C compilation)
      - name: Build ARM64 binary in Docker
        run: |
          docker run --rm --platform linux/arm64/v8 \
            -v "$PWD:/workspace" \
            -w /workspace \
            golang:1.26-alpine \
            sh -c "
              apk add --no-cache build-base gcc && \
              CGO_ENABLED=1 \
              CGO_CFLAGS='-D_LARGEFILE64_SOURCE' \
              go build -ldflags='-s -w' -o SuperXray-gui-arm64 main.go && \
              echo 'ARM64 build completed successfully'
            "

      # Verify the binary is a valid ARM64 executable and can run under QEMU
      - name: Verify ARM64 binary in QEMU
        run: |
          # Check binary file type (should show ELF 64-bit LSB executable, ARM aarch64)
          docker run --rm --platform linux/arm64/v8 \
            -v "$PWD:/workspace" \
            -w /workspace \
            arm64v8/alpine:latest \
            sh -c "
              apk add --no-cache file ca-certificates tzdata && \
              echo '--- File type verification ---' && \
              file ./SuperXray-gui-arm64 && \
              echo '--- Version check ---' && \
              ./SuperXray-gui-arm64 -v
            "
